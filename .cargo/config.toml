[target.thumbv6m-none-eabi]
# `cargo run --target thumbv6m-none-eabi` flashes via SWD + RTT logging
# Alternatives:
#   cargo embed --target thumbv6m-none-eabi   # via probe-rs with RTT
#   elf2uf2-rs -d                             # USB boot mode
runner = "probe-rs run --chip RP2040 --protocol swd"

rustflags = [
  "-C", "linker=flip-link",
  "-C", "link-arg=--nmagic",
  "-C", "link-arg=-Tlink.x",
  "-C", "link-arg=-Tdefmt.x",

  # Code-size optimizations.
  #   trap unreachable can save a lot of space, but requires nightly compiler.
  #   uncomment the next line if you wish to enable it
  # "-Z", "trap-unreachable=no",
  "-C", "no-vectorize-loops",
]

[env]
DEFMT_LOG = "debug"
